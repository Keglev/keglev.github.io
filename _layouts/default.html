<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }}{% else %}{{ site.title }}{% endif %}</title>
    <meta name="description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">
    
    <!-- SEO tags -->
    {% seo %}
    
    <style>
        /* Minimal, enterprise-lean CSS (works on GitHub Pages/Jekyll) */
        :root { 
            --fg:#0f172a; --muted:#475569; --link:#0ea5e9; 
            --bg:#ffffff; --card:#f8fafc; --line:#e2e8f0; 
        }
        @media (prefers-color-scheme: dark) {
            :root { 
                --fg:#e5e7eb; --muted:#94a3b8; --link:#38bdf8; 
                --bg:#0b1220; --card:#0f172a; --line:#1f2937; 
            }
        }
        
        html, body { 
            background:var(--bg); color:var(--fg); 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        
        a { color:var(--link); text-decoration: none; }
        a:hover { text-decoration: underline; }
        
        .grid { 
            display:grid; 
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); 
            gap:16px; margin: 16px 0 8px; 
        }
        
        .card { 
            border:1px solid var(--line); 
            background:var(--card); 
            border-radius:12px; 
            padding:16px; 
        }
        .card h3 { margin:0 0 6px 0; font-size:1.05rem; }
        .card p { margin:0 0 12px 0; color:var(--muted); line-height:1.5; }
        
        .badges { display:flex; flex-wrap:wrap; gap:8px; margin: 8px 0 0 0; }
        .badge { 
            font-size:.75rem; padding:4px 8px; border-radius:999px; 
            background:var(--line); color:var(--muted); 
        }
        
        .section-title { 
            font-size:0.95rem; font-weight:600; letter-spacing:.02em; 
            color:var(--muted); margin-top:28px; 
        }
        
        hr { border:0; border-top:1px solid var(--line); margin:24px 0; }
        
        .cta { 
            display:inline-block; padding:10px 14px; border-radius:10px; 
            border:1px solid var(--line); background:var(--card); 
        }
        
        .small { color:var(--muted); font-size:0.9rem; }
        
        .kv { 
            display:grid; grid-template-columns: 140px auto; 
            gap:8px 16px; margin:8px 0 0 0; 
        }
        .kv div { padding:0; margin:0; }
        
        /* Additional Jekyll enhancements */
        .site-header { 
            border-bottom: 1px solid var(--line); 
            margin-bottom: 20px; 
            padding-bottom: 20px; 
        }
        
        .site-footer { 
            border-top: 1px solid var(--line); 
            margin-top: 40px; 
            padding-top: 20px; 
        }
    </style>
</head>
<body>
    <div class="site-header">
        <nav>
            <a href="{{ '/' | relative_url }}">{{ site.title }}</a>
        </nav>
    </div>
    
    <main>
        {{ content }}
    </main>
    
    <footer class="site-footer">
        <span class="small">© {{ site.author }}. Content and code available under their respective licenses.</span>
    </footer>
</body>
</html>
